name: ai_paywall_demo
description: "A small product-like Flutter demo app showing onboarding, a subscription paywall, local billing simulation, persisted entitlement state, and a protected home screen."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  go_router: ^16.3.0
  shared_preferences: ^2.5.3
  slang: ^4.8.1
  slang_flutter: ^4.8.0
  tamed_json: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#3366CC"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F7FAFF"
  image: assets/branding/splash_icon.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#F7FAFF"
    image: assets/branding/splash_icon_android12.png
